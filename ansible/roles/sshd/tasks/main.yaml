---

- name: Install sshd
  ansible.builtin.apt:
    name: openssh-server
    state: present

- name: Configure sshd
  ansible.builtin.template:
    src: templates/sshd_config.j2
    dest: /etc/ssh/sshd_config
    mode: "0644"
    owner: root
  notify: Restart sshd

- name: Create SSH key directory
  ansible.builtin.file:
    path: "{{ sshd_key_directory }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
