---

- name: Download Prometheus
  ansible.builtin.get_url:
    url: https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz
    dest: /tmp/prometheus.tar.gz
    checksum: "{{ prometheus_checksum }}"
    owner: root
    group: root
    mode: "0700"

- name: Extract Prometheus
  ansible.builtin.unarchive:
    remote_src: true
    src: /tmp/prometheus.tar.gz
    dest: "{{ prometheus_install_dir }}"
    owner: root
    group: root
    mode: "0755"
    extra_opts:
      - --strip-components
      - 1
      - --show-stored-names

- name: Create environment file for Prometheus
  ansible.builtin.template:
    src: templates/prometheus.j2
    dest: /etc/default/prometheus
    mode: "0644"
    owner: root
    group: root

- name: Create systemd service unit for Prometheus
  ansible.builtin.template:
    src: templates/prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
    owner: root
    group: root

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ prometheus_install_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ prometheus_data_dir }}"
      owner: prometheus
      group: prometheus
      mode: "0750"
    - path: "{{ prometheus_config_dir }}"
      owner: root
      group: prometheus
      mode: "0750"

- name: Configure Prometheus
  ansible.builtin.template:
    src: templates/prometheus.conf.j2
    dest: "{{ prometheus_config_dir }}/prometheus.conf"
    owner: root
    group: root
    mode: "0755"
  notify: Restart Prometheus

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Start Prometheus
  ansible.builtin.service:
    name: prometheus
    state: started
    enabled: true

- name: Install Prometheus exporters
  ansible.builtin.apt:
    name: "{{ item.name }}"
    state: present
  loop: "{{ prometheus_exporters }}"

- name: Configure Prometheus exporters
  ansible.builtin.template:
    src: templates/{{ item.config_name }}.j2
    dest: "{{ prometheus_config_dir }}/{{ item.config_name }}"
    mode: "0440"
    owner: root
    group: prometheus
  loop: "{{ prometheus_exporters }}"
  when: item.config_name is defined
  notify: Restart Prometheus exporters
  no_log: true

- name: Configure arguments for Prometheus exporters
  ansible.builtin.template:
    src: templates/args.j2
    dest: /etc/default/{{ item.name }}
    mode: "0640"
    owner: prometheus
    group: prometheus
  loop: "{{ prometheus_exporters }}"
  when: item.args is defined
  notify: Restart Prometheus exporters

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Start Prometheus exporters
  ansible.builtin.service:
    name: "{{ item.name }}"
    state: started
    enabled: true
  loop: "{{ prometheus_exporters }}"
