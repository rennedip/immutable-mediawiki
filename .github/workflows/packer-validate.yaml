name: packer-validate
on:
  push:
    branches:
      - main
jobs:
  validate:
    name: Packer Validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-packer@v3
        with:
          version: "1.15.0"

      - name: Initialize Packer project
        run: packer init .

      - name: Run Packer Validate
        run: packer validate .
defaults:
  run:
    working-directory: ./packer