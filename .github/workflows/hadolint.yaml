name: hadolint
on:
  push:
    branches:
      - main
      - dev
jobs:
  lint:
    name: Hadolint
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        project:
          - mediawiki
          - mysql
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./docker/${{ matrix.project }}/Dockerfile
