apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediawiki-deployment
spec:
  selector:
    matchLabels:
      app: mediawiki
  replicas: 1
  template:
    metadata:
      labels:
        app: mediawiki
    spec:
      containers:
        - name: mediawiki
          image: dhi.io/mediawiki:1.45.1-debian13-php-fpm
          volumeMounts:
            - name: document-root
              mountPath: /var/www/html
            - name: data
              mountPath: /var/www/data
            - name: mw-config
              subPath: config
              mountPath: /var/www/html/LocalSettings.php
              readOnly: true
        - name: apache
          image: dhi.io/httpd:2.4.66-debian13
          volumeMounts:
            - name: document-root
              mountPath: /var/www/html
              readOnly: true
      volumes:
        - name: document-root
          persistentVolumeClaim:
            claimName: document-root
        - name: data
          persistentVolumeClaim:
            claimName: data
        - name: mw-config
          configMap:
            name: mw-config
        - name: apache-config
          configMap:
            name: apache-config